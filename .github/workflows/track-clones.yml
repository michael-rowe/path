name: Track clone counts

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:       # Manual trigger via GitHub UI

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and append clone counts
        run: |
          mkdir -p stats
          gh api repos/michael-rowe/path/traffic/clones \
            --jq "{date: \"$(date -u +%Y-%m-%d)\", uniques: .uniques, count: .count}" \
            >> stats/clones.jsonl
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/clones.jsonl
          git diff --staged --quiet || git commit -m "chore: update clone stats"
          git push
