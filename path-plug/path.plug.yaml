name: path
# Plug needs network access to reach the rclone-svc sidecar from
# Path: Sync to cloud. Without this, fetch() throws
# "Missing permission 'fetch' for syscall sandboxFetch.fetch".
requiredPermissions:
  - fetch
functions:
  showAttributesPanel:
    path: path.ts:showAttributesPanel
    command:
      name: "Path: Show attributes panel"

  showLeftPanel:
    path: path.ts:showLeftPanel
    command:
      name: "Path: Refresh navigator"

  saveAttributes:
    path: path.ts:saveAttributes

  onPageLoaded:
    path: path.ts:onPageLoaded
    events:
      - editor:pageLoaded

  toggleZenMode:
    path: path.ts:toggleZenMode
    command:
      name: "Path: Toggle focus mode"
      key: "Ctrl-Alt-z"

  search:
    path: path.ts:search
    command:
      name: "Path: Search"
      key: "Ctrl-Shift-f"

  syncToCloud:
    path: path.ts:syncToCloud
    command:
      name: "Path: Sync to cloud"


