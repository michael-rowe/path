name: path
functions:
  hello:
    path: path.ts:hello
    command:
      name: "Path: Hello from plug"

  showAttributesPanel:
    path: path.ts:showAttributesPanel
    command:
      name: "Path: Show attributes panel"

  showLeftPanel:
    path: path.ts:showLeftPanel
    command:
      name: "Path: Refresh navigator"

  saveAttributes:
    path: path.ts:saveAttributes

  debugSave:
    path: path.ts:debugSave
    command:
      name: "Path: Debug save (writes title=DEBUG_TEST)"

  onPageLoaded:
    path: path.ts:onPageLoaded
    events:
      - editor:pageLoaded

  toggleZenMode:
    path: path.ts:toggleZenMode
    command:
      name: "Path: Toggle focus mode"
      key: "Ctrl-Alt-z"

  search:
    path: path.ts:search
    command:
      name: "Path: Search"
      key: "Ctrl-Shift-f"

  syncToCloud:
    path: path.ts:syncToCloud
    command:
      name: "Path: Sync to cloud"


