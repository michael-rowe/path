services:

  silverbullet:
    image: ghcr.io/silverbulletmd/silverbullet
    container_name: path-silverbullet
    # Bind to loopback by default so the portfolio (which holds all CPD data)
    # is not reachable from the LAN. Set SB_BIND_HOST=0.0.0.0 in .env only if you
    # deliberately want remote access — then SB_USER basic auth is the only thing
    # protecting your data, so make it strong.
    ports:
      - "${SB_BIND_HOST:-127.0.0.1}:3000:3000"
    volumes:
      - ./space:/space
    environment:
      - SB_USER=${SB_USER}
    networks:
      path-net:
    restart: unless-stopped

  # Pandoc + FastAPI sidecar — Word (.docx) export only.
  # Optional — only needed for Word export.
  # Start with: docker compose --profile export up -d
  # Reachable from SB via its static IP inside the path-net network at
  # http://172.28.0.10:8000. Not exposed to the host.
  pandoc-svc:
    image: ghcr.io/michael-rowe/path-pandoc-svc:latest
    container_name: path-pandoc-svc
    profiles:
      - export
    volumes:
      - ./space:/space:ro
      - ./exports:/exports
    networks:
      path-net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  # Path MCP server — exposes portfolio data to AI clients via SSE.
  # Start with: docker compose --profile ai up -d
  # Configure your AI client to connect at http://localhost:3001/sse
  path-mcp:
    image: ghcr.io/michael-rowe/path-mcp:latest
    container_name: path-mcp
    profiles:
      - ai
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./space:/space
    networks:
      path-net:
    restart: unless-stopped
    healthcheck:
      # path-mcp serves SSE at /sse; a HEAD-style probe with a short
      # timeout is enough to confirm uvicorn is up.
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:3001/sse', timeout=2); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Meilisearch — high-performance search engine.
  # Start with: docker compose --profile search up -d
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: path-meilisearch
    profiles:
      - search
    ports:
      - "127.0.0.1:7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    networks:
      path-net:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Meili-indexer — watches the space and indexes YAML/body into Meilisearch.
  # Start with: docker compose --profile search up -d
  meili-indexer:
    image: ghcr.io/michael-rowe/path-meili-indexer:latest
    container_name: path-meili-indexer
    profiles:
      - search
    environment:
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
    volumes:
      - ./space:/space:ro
    networks:
      path-net:
    depends_on:
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # No HTTP surface; check the watchdog process is still alive.
      test: ["CMD", "pgrep", "-f", "python main.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Git-watcher — automated "Time Machine" versioning.
  git-watcher:
    image: ghcr.io/michael-rowe/path-git-watcher:latest
    container_name: path-git-watcher
    ports:
      - "127.0.0.1:8020:8020"
    volumes:
      - ./space:/space
    networks:
      path-net:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8020/health', timeout=2); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # LanguageTool — self-hosted grammar and style checker.
  # Start with: docker compose --profile writing up -d
  languagetool:
    image: erikvl87/languagetool
    container_name: path-languagetool
    profiles:
      - writing
    ports:
      - "127.0.0.1:8010:8010"
    networks:
      path-net:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8010/v2/languages"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Lychee — broken link checker.
  # Start with: docker compose --profile writing up -d
  lychee-svc:
    image: ghcr.io/michael-rowe/path-lychee-svc:latest
    container_name: path-lychee-svc
    profiles:
      - writing
    ports:
      - "127.0.0.1:8030:8030"
    volumes:
      - ./space:/space:ro
    networks:
      path-net:
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8030/health', timeout=2); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Rclone — cloud backup sidecar.
  # Start with: docker compose --profile backup up -d
  # Configure with: docker compose run --rm rclone-svc rclone config
  rclone-svc:
    image: ghcr.io/michael-rowe/path-rclone-svc:latest
    container_name: path-rclone-svc
    profiles:
      - backup
    ports:
      - "127.0.0.1:8040:8040"
    environment:
      - RCLONE_REMOTE=${RCLONE_REMOTE:-gdrive}
    volumes:
      - ./space:/space:ro
      - ./rclone_config:/config/rclone
    # Static IP so the path plug can reach this sidecar by bare IP from
    # the SB container's sandbox fetch. SB's HTTP proxy auto-detects
    # HTTPS for non-IP hostnames (per pandoc-svc note above), which
    # mangles plain-text http:// requests to a docker service name.
    networks:
      path-net:
        ipv4_address: 172.28.0.11
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8040/health', timeout=2); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  path-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  meili_data:
